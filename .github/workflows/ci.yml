name: CI Pipeline

on:
  push:
    branches: [ main, devops-daksh ]
  pull_request:

jobs:
  build-test-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: echo "No tests yet, but pipeline works!"

      - name: Run security audit
        run: |
          npm audit --audit-level=high > audit-report.txt || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.txt
