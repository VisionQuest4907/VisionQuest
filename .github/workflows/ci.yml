name: CI Pipeline

on:
  push:
    branches: [ main, devops-daksh ]
  pull_request:

jobs:
  build-test-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci
      - name: Build Docker image (CI check)
        run: |
          docker build -t visionquest-api-ci .


      - name: Run tests
        run: echo "No tests yet, but pipeline works!"
      - name: Run automated tests
        env:
          MONGO_URI: mongodb://localhost:27017/test
          JWT_SECRET: test-secret-min-32-chars-for-ci
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage
          path: coverage/

      - name: Run npm audit (warn only)
        run: npm audit --audit-level=high > audit-report.txt || echo "npm audit found issues"
        continue-on-error: true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.txt
      - name: Notify on vulnerabilities (if any)
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ] && [ -f audit-report.txt ]; then
            if grep -qi 'vulnerabilit' audit-report.txt && ! grep -q 'found 0 vulnerabilities' audit-report.txt; then
              curl -sS -X POST -H 'Content-type: application/json' --data "{\"text\":\"🔒 npm audit found vulnerabilities: ${{ github.repository }} — ${{ github.ref_name }} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" "$SLACK_WEBHOOK_URL" || true
            fi
          fi
  notify-on-failure:
    runs-on: ubuntu-latest
    needs: build-test-audit
    if: failure() || cancelled()
    steps:
      - name: Notify Slack on CI failure
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sS -X POST -H 'Content-type: application/json' --data "{\"text\":\"⚠️ CI Failed: ${{ github.repository }} — ${{ github.ref_name }} — Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" "$SLACK_WEBHOOK_URL" || true
          else
            echo "SLACK_WEBHOOK_URL not set; skip notification"
          fi
